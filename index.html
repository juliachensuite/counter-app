<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Random</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    body {
      font-family: -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #0f766e;   /* teal */
      color: #fff;
      overflow: hidden;
    }
    #result { font-size: 160px; font-weight: bold; margin-bottom: 20px; line-height: 1; }
    .buttons { display: flex; gap: 12px; }
    button {
      font-size: 48px;
      padding: 36px 64px;
      border: none;
      border-radius: 24px;
      cursor: pointer;
      background: #0f3460;
      color: #fff;
    }
    button:hover { background: #16529e; }
    button:active { transform: scale(0.96); }
    .range-control { margin-top: 36px; display: flex; flex-direction: column; align-items: center; gap: 8px; width: 80%; max-width: 360px; }
    .range-control label { font-size: 16px; opacity: 0.85; }
    .range-control input { width: 100%; }
    /* canvas sits on top of everything for the particle effects */
    #fx { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
    @keyframes shake {
      0%, 100% { transform: translate(0, 0); }
      20% { transform: translate(-12px, 8px); }
      40% { transform: translate(10px, -10px); }
      60% { transform: translate(-8px, 6px); }
      80% { transform: translate(6px, -8px); }
    }
    body.shake { animation: shake 0.5s; }
  </style>
</head>
<body>
  <div id="result">—</div>
  <div class="buttons">
    <button id="generate" onclick="generate()">Generate</button>
  </div>
  <div class="range-control">
    <label for="max">Maximum: <span id="maxLabel">100</span></label>
    <input type="range" id="max" min="1" max="100" value="100">
  </div>

  <canvas id="fx"></canvas>

  <script>
    const result = document.getElementById("result");
    const maxSlider = document.getElementById("max");
    const maxLabel = document.getElementById("maxLabel");

    // Load saved maximum, or fall back to default
    let max = Number(localStorage.getItem("max")) || 100;
    maxSlider.value = max;
    maxLabel.textContent = max;

    maxSlider.addEventListener("input", () => {
      max = Number(maxSlider.value);
      maxLabel.textContent = max;
      localStorage.setItem("max", max);
    });

    function generate() {
      const n = Math.floor(Math.random() * max) + 1;  // 1..max inclusive
      result.textContent = n;
      if (n === 7) {
        explosion();
      } else {
        confetti();
      }
    }

    /* ---------- particle canvas ---------- */
    const canvas = document.getElementById("fx");
    const ctx = canvas.getContext("2d");
    let particles = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener("resize", resize);

    function confetti() {
      const colors = ["#f94144", "#f9c74f", "#90be6d", "#43aa8b", "#577590", "#f3722c", "#ffffff"];
      for (let i = 0; i < 160; i++) {
        particles.push({
          x: canvas.width / 2,
          y: canvas.height / 2,
          vx: (Math.random() - 0.5) * 14,
          vy: Math.random() * -16 - 4,
          size: Math.random() * 8 + 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          rot: Math.random() * Math.PI,
          vrot: (Math.random() - 0.5) * 0.3,
          gravity: 0.4,
          life: 1,
          decay: 0.008,
          shape: "rect"
        });
      }
    }

    function explosion() {
      document.body.classList.remove("shake");
      void document.body.offsetWidth; // restart animation
      document.body.classList.add("shake");
      const colors = ["#ff2200", "#ff6600", "#ffaa00", "#ffdd00", "#888888"];
      for (let i = 0; i < 220; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 20 + 4;
        particles.push({
          x: canvas.width / 2,
          y: canvas.height / 2,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size: Math.random() * 10 + 3,
          color: colors[Math.floor(Math.random() * colors.length)],
          rot: 0,
          vrot: 0,
          gravity: 0.15,
          life: 1,
          decay: 0.012,
          shape: "circle"
        });
      }
    }

    function tick() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles = particles.filter((p) => p.life > 0);
      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += p.gravity;
        p.rot += p.vrot;
        p.life -= p.decay;
        ctx.save();
        ctx.globalAlpha = Math.max(p.life, 0);
        ctx.fillStyle = p.color;
        ctx.translate(p.x, p.y);
        if (p.shape === "circle") {
          ctx.beginPath();
          ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.rotate(p.rot);
          ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
        }
        ctx.restore();
      }
      requestAnimationFrame(tick);
    }
    tick();

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</body>
</html>
