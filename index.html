<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Random</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    body {
      font-family: -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #0f766e;   /* teal */
      color: #fff;
      overflow: hidden;
    }
    #result { font-size: 160px; font-weight: bold; margin-bottom: 20px; line-height: 1; }
    .buttons { display: flex; gap: 12px; }
    button {
      font-size: 24px;
      padding: 18px 32px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      background: #0f3460;
      color: #fff;
    }
    button:hover { background: #16529e; }
    button:active { transform: scale(0.96); }
    .range-control { margin-top: 36px; display: flex; flex-direction: column; align-items: center; gap: 12px; width: 80%; max-width: 360px; }
    .range-control label { font-size: 16px; opacity: 0.85; }

    /* dual-handle range slider: two inputs sharing one track */
    .dual { position: relative; width: 100%; height: 40px; }
    .dual .track, .dual .track-fill {
      position: absolute; top: 50%; transform: translateY(-50%);
      height: 6px; border-radius: 3px;
    }
    .dual .track { left: 0; right: 0; background: rgba(255, 255, 255, 0.3); }
    .dual .track-fill { background: #fff; }
    .dual input[type=range] {
      position: absolute; top: 0; left: 0; width: 100%; height: 40px;
      margin: 0; background: none; pointer-events: none;  /* track inert */
      -webkit-appearance: none; appearance: none;
    }
    .dual input[type=range]::-webkit-slider-runnable-track { background: none; }
    .dual input[type=range]::-moz-range-track { background: none; }
    /* bigger knobs, and only the knob is grabbable */
    .dual input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none; pointer-events: auto; cursor: pointer;
      width: 34px; height: 34px; border-radius: 50%;
      background: #fff; border: 4px solid #0f3460; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
    }
    .dual input[type=range]::-moz-range-thumb {
      pointer-events: auto; cursor: pointer;
      width: 34px; height: 34px; border-radius: 50%;
      background: #fff; border: 4px solid #0f3460; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
    }
    /* canvas sits on top of everything for the particle effects */
    #fx { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
    @keyframes shake {
      0%, 100% { transform: translate(0, 0); }
      20% { transform: translate(-12px, 8px); }
      40% { transform: translate(10px, -10px); }
      60% { transform: translate(-8px, 6px); }
      80% { transform: translate(6px, -8px); }
    }
    body.shake { animation: shake 0.5s; }
  </style>
</head>
<body>
  <div id="result">—</div>
  <div class="buttons">
    <button id="generate" onclick="generate()">Generate</button>
  </div>
  <div class="range-control">
    <label>Range: <span id="rangeLabel">1 – 100</span></label>
    <div class="dual" id="dual">
      <div class="track"></div>
      <div class="track-fill" id="trackFill"></div>
      <input type="range" id="min" min="1" max="100" value="1">
      <input type="range" id="max" min="1" max="100" value="100">
    </div>
  </div>

  <canvas id="fx"></canvas>

  <script>
    const result = document.getElementById("result");
    const minSlider = document.getElementById("min");
    const maxSlider = document.getElementById("max");
    const rangeLabel = document.getElementById("rangeLabel");
    const trackFill = document.getElementById("trackFill");

    const SLIDER_MIN = 1, SLIDER_MAX = 100;

    // Load saved bounds, or fall back to defaults
    let min = Number(localStorage.getItem("min")) || SLIDER_MIN;
    let max = Number(localStorage.getItem("max")) || SLIDER_MAX;
    minSlider.value = min;
    maxSlider.value = max;

    function updateUI() {
      const span = SLIDER_MAX - SLIDER_MIN;
      trackFill.style.left = ((min - SLIDER_MIN) / span) * 100 + "%";
      trackFill.style.width = ((max - min) / span) * 100 + "%";
      rangeLabel.textContent = min + " – " + max;
    }
    updateUI();

    minSlider.addEventListener("input", () => {
      min = Number(minSlider.value);
      if (min > max) { min = max; minSlider.value = min; }  // handles can't cross
      localStorage.setItem("min", min);
      minSlider.style.zIndex = 5; maxSlider.style.zIndex = 4;  // last-touched on top
      updateUI();
    });

    maxSlider.addEventListener("input", () => {
      max = Number(maxSlider.value);
      if (max < min) { max = min; maxSlider.value = max; }  // handles can't cross
      localStorage.setItem("max", max);
      maxSlider.style.zIndex = 5; minSlider.style.zIndex = 4;
      updateUI();
    });

    function generate() {
      const n = Math.floor(Math.random() * (max - min + 1)) + min;  // min..max inclusive
      result.textContent = n;
      if (n === 7) {
        explosion();
      } else {
        confetti();
      }
    }

    /* ---------- particle canvas ---------- */
    const canvas = document.getElementById("fx");
    const ctx = canvas.getContext("2d");
    let particles = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener("resize", resize);

    function confetti() {
      const colors = ["#f94144", "#f9c74f", "#90be6d", "#43aa8b", "#577590", "#f3722c", "#ffffff"];
      for (let i = 0; i < 160; i++) {
        particles.push({
          x: canvas.width / 2,
          y: canvas.height / 2,
          vx: (Math.random() - 0.5) * 14,
          vy: Math.random() * -16 - 4,
          size: Math.random() * 8 + 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          rot: Math.random() * Math.PI,
          vrot: (Math.random() - 0.5) * 0.3,
          gravity: 0.4,
          life: 1,
          decay: 0.008,
          shape: "rect"
        });
      }
    }

    // When > now, the whole screen is engulfed in flames (timestamp in ms).
    let flamesUntil = 0;
    const flameColors = ["#ff2200", "#ff4400", "#ff7700", "#ffaa00", "#ffdd33"];

    function explosion() {
      document.body.classList.remove("shake");
      void document.body.offsetWidth; // restart animation
      document.body.classList.add("shake");
      const colors = ["#ff2200", "#ff6600", "#ffaa00", "#ffdd00", "#888888"];
      for (let i = 0; i < 220; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 20 + 4;
        particles.push({
          x: canvas.width / 2,
          y: canvas.height / 2,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size: Math.random() * 10 + 3,
          color: colors[Math.floor(Math.random() * colors.length)],
          rot: 0,
          vrot: 0,
          gravity: 0.15,
          life: 1,
          decay: 0.012,
          shape: "circle"
        });
      }
      // ...then the whole screen bursts into flames for 3 seconds.
      flamesUntil = performance.now() + 3000;
    }

    // Spawn a batch of rising flame particles along the bottom edge.
    function spawnFlames() {
      for (let i = 0; i < 26; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: canvas.height + 10,
          vx: (Math.random() - 0.5) * 3,
          vy: -(Math.random() * 9 + 7),
          size: Math.random() * 40 + 20,
          color: flameColors[Math.floor(Math.random() * flameColors.length)],
          rot: 0,
          vrot: 0,
          gravity: 0.12,
          life: 1,
          decay: 0.022,
          shape: "flame"
        });
      }
    }

    function tick() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (performance.now() < flamesUntil) {
        spawnFlames();
        // warm flickering glow over the whole screen while it burns
        ctx.fillStyle = "rgba(255, 90, 0, " + (0.12 + Math.random() * 0.08) + ")";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      particles = particles.filter((p) => p.life > 0);
      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += p.gravity;
        p.rot += p.vrot;
        p.life -= p.decay;
        ctx.save();
        ctx.globalAlpha = Math.max(p.life, 0);
        ctx.fillStyle = p.color;
        ctx.translate(p.x, p.y);
        if (p.shape === "flame") {
          ctx.globalCompositeOperation = "lighter"; // additive glow
          ctx.beginPath();
          ctx.arc(0, 0, Math.max(0, (p.size / 2) * p.life), 0, Math.PI * 2);
          ctx.fill();
        } else if (p.shape === "circle") {
          ctx.beginPath();
          ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.rotate(p.rot);
          ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
        }
        ctx.restore();
      }
      requestAnimationFrame(tick);
    }
    tick();

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</body>
</html>
